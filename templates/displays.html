<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>Silent Disco · Mur</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/displays.css') }}">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="displays-mur" data-count="{{ salles|length }}">
    {% if not salles %}
    <div class="empty">Aucune salle configurée.</div>
    {% endif %}

    <div class="grille-salles">
        {% for s in salles %}
        <section class="tuile" data-salle="{{ s.nom }}"
                 style="--accent: {{ s.couleur }}; --accent-rgb: {{ s.couleur_rgb }}">
            <header class="tuile-header">
                <div class="tuile-titre">
                    <div class="label-salle">Salle</div>
                    <h2>{{ s.nom }}</h2>
                </div>
            </header>

            <div class="en-cours">
                <img class="pochette-en-cours" src="{{ s.chanson_en_cours.pochette }}" alt="">
                <div class="en-cours-infos">
                    <div class="titre-en-cours">{{ s.chanson_en_cours.titre or 'En attente…' }}</div>
                    <div class="artiste-en-cours">{{ s.chanson_en_cours.artiste }}</div>
                    <div class="barre-container"><div class="barre"></div></div>
                    <div class="temps">0:00 / 0:00</div>
                </div>
            </div>

            <div class="section-vote">
                <div class="section-vote-titre">Votez pour la prochaine</div>
                <div class="chansons"></div>
            </div>

            <footer class="tuile-footer">
                <div class="qr" data-url="{{ s.vote_url }}"></div>
                <div class="qr-legende">Scanne pour voter</div>
            </footer>
        </section>
        {% endfor %}
    </div>

    <script>
        window.INITIAL_STATE = {
            salles: {{ salles | tojson }},
        };
    </script>
    <script src="{{ url_for('static', filename='js/displays.js') }}"></script>
</body>
</html>
